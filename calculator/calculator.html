<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Calculator</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    background: black;
    font-family: "Poppins", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
}


.app {
    width: 100vw;
    height: 100vh;
    display: flex;
    animation: fadeIn 1s ease;
}


.history {
    width: 25%;
    background: rgba(255,255,255,0.05);
    border-right: 2px solid rgba(255,255,255,0.1);
    padding: 15px;
    color: #0ff;
    overflow-y: auto;
}

.history h3 {
    text-align: center;
    margin-bottom: 8px;
    font-size: 18px;
}

.history button {
    width: 100%;
    margin-bottom: 10px;
    padding: 6px;
    border: none;
    border-radius: 10px;
    background: rgba(255,0,0,0.6);
    color: white;
    cursor: pointer;
}

.history p {
    font-size: 14px;
    margin: 6px 0;
    color: #fff;
}
.calculator {
    width: 75%;
    padding: 20px;
    display: flex;
    flex-direction: column;
}


#display {
    flex: 0 0 22%;
    font-size: 5vw;
    padding: 20px;
    border: none;
    border-radius: 20px;
    text-align: right;
    background: rgba(255,255,255,0.15);
    color: #fff;

  
    overflow-x: auto;
    white-space: nowrap;
    scrollbar-width: none;
}

#display::-webkit-scrollbar {
    display: none;
}

.buttons {
    flex: 1;
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
}


.btn {
    border: none;
    border-radius: 18px;
    font-size: 3vw;
    color: white;
    background: rgba(255,255,255,0.15);
    transition: 0.2s;
}

.btn:active {
    transform: scale(0.94);
}

.op { background: rgba(0,242,255,0.55); }
.clear, .del { background: rgba(255,0,0,0.55); }
.equals { background: rgba(0,255,127,0.55); }

.zero {
    grid-column: span 2;
}


@media (max-width: 768px) {
    .app {
        flex-direction: column;
    }
    .history {
        width: 100%;
        height: 30%;
        border-right: none;
        border-bottom: 2px solid rgba(255,255,255,0.1);
    }
    .calculator {
        width: 100%;
        height: 70%;
    }
    #display {
        font-size: 8vw;
    }
    .btn {
        font-size: 6vw;
    }
}


@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>
</head>

<body>

<div class="app">
    
    <div class="history" id="history">
        <div style="text-align: center; color: white;">
        Basic Calculator
    </div>
        <h3>History</h3>
        <button onclick="clearHistory()">Clear History</button>
    </div>

    <div class="calculator">
        <input type="text" id="display" readonly>

        <div class="buttons">
            <button class="btn clear" onclick="clearDisplay()">Clear</button>
            <button class="btn del" onclick="deleteLast()">DEL</button>
            <button class="btn op" onclick="append('%')">%</button>
            <button class="btn op" onclick="append('/')">÷</button>

            <button class="btn" onclick="append('7')">7</button>
            <button class="btn" onclick="append('8')">8</button>
            <button class="btn" onclick="append('9')">9</button>
            <button class="btn op" onclick="append('*')">×</button>

            <button class="btn" onclick="append('4')">4</button>
            <button class="btn" onclick="append('5')">5</button>
            <button class="btn" onclick="append('6')">6</button>
            <button class="btn op" onclick="append('-')">−</button>

            <button class="btn" onclick="append('1')">1</button>
            <button class="btn" onclick="append('2')">2</button>
            <button class="btn" onclick="append('3')">3</button>
            <button class="btn op" onclick="append('+')">+</button>

            <button class="btn zero" onclick="append('0')">0</button>
            <button class="btn" onclick="append('.')">.</button>
            <button class="btn equals" onclick="calculate()">=</button>
        </div>
    </div>
</div>

<script>
let display = document.getElementById("display");
let historyBox = document.getElementById("history");
let justCalculated = false;

function autoScroll() {
    display.scrollLeft = display.scrollWidth;
}

function append(value) {
    let last = display.value.slice(-1);

    if (justCalculated && !isNaN(value)) display.value = "";
    if (isNaN(value) && isNaN(last)) {
        display.value = display.value.slice(0, -1) + value;
        autoScroll();
        return;
    }

    display.value += value;
    autoScroll();
    justCalculated = false;
}

function clearDisplay() {
    display.value = "";
    autoScroll();
}

function deleteLast() {
    display.value = display.value.slice(0, -1);
    autoScroll();
}

function clearHistory() {
    historyBox.innerHTML = "<h3>History</h3><button onclick='clearHistory()'>Clear History</button>";
}

function calculate() {
    try {
        let expression = display.value;
        let result = eval(expression);
        display.value = result;

        let p = document.createElement("p");
        p.textContent = `${expression} = ${result}`;
        historyBox.appendChild(p);
        historyBox.scrollTop = historyBox.scrollHeight;

        autoScroll();
        justCalculated = true;
    } catch {
        display.value = "Error";
        justCalculated = true;
        autoScroll();
    }
}
document.addEventListener("keydown", (event) => {
    const key = event.key;

    if (!isNaN(key)) append(key);
    if ("+-*/.%".includes(key)) append(key);

    if (key === "Enter") {
        event.preventDefault();
        calculate();
    }
    if (key === "Backspace") deleteLast();
    if (key === "Escape") clearDisplay();
});
</script>

</body>
</html>
